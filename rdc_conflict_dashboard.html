<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRC Civilian Conflict Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #e74c3c;
        }
        .stat-label {
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            font-size: 1.2em;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8em;
            color: #95a5a6;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DRC Conflict Insights Dashboard</h1>
        <p>Analyzing Civilian Targeting & Fatalities (2015 - Present)</p>
    </header>

    <div class="stats-grid">
        <div class="card" style="text-align: center;">
            <div class="stat-label">Total Civilians Killed</div>
            <div id="total-fatalities" class="stat-value">...</div>
            <p>Reported by ACLED</p>
        </div>
        <div class="card">
            <h2>Fatalities by Province (Top 10)</h2>
            <div class="chart-container">
                <canvas id="provinceChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Yearly Trend of Violence</h2>
        <div class="chart-container">
            <canvas id="yearChart"></canvas>
        </div>
    </div>

    <div class="footer">
        Data Source: ACLED (Armed Conflict Location & Event Data Project) via HDX.
    </div>
</div>

<script>
    async function loadData() {
        try {
            const data = {"total": 28916, "provinces": {"Nord-Kivu": 13756, "Ituri": 8747, "Sud-Kivu": 2385, "Kasai": 742, "Kasai-Central": 709, "Mai-Ndombe": 633, "Kinshasa": 547, "Tanganyika": 385, "Tshopo": 131, "Kongo-Central": 108, "Haut-Katanga": 101, "Haut-Uele": 95, "Kwilu": 92, "Bas-Uele": 79, "Maniema": 75, "Tshuapa": 69, "Kwango": 57, "Haut-Lomami": 55, "Lualaba": 45, "Mongala": 23, "Kasai-Oriental": 21, "Lomami": 17, "Sud-Ubangi": 14, "Sankuru": 13, "Equateur": 11, "Nord-Ubangi": 6}, "years": {"2015": 948, "2016": 699, "2017": 1671, "2018": 1398, "2019": 1979, "2020": 2948, "2021": 3446, "2022": 4339, "2023": 3578, "2024": 3459, "2025": 3861, "2026": 590}};

            // Update Total
            document.getElementById('total-fatalities').innerText = data.total.toLocaleString();

            // Province Chart
            const provLabels = Object.keys(data.provinces).slice(0, 10);
            const provValues = Object.values(data.provinces).slice(0, 10);

            new Chart(document.getElementById('provinceChart'), {
                type: 'bar',
                data: {
                    labels: provLabels,
                    datasets: [{
                        label: 'Fatalities',
                        data: provValues,
                        backgroundColor: '#3498db',
                        borderRadius: 5
                    }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            // Year Chart
            const yearLabels = Object.keys(data.years);
            const yearValues = Object.values(data.years);

            new Chart(document.getElementById('yearChart'), {
                type: 'line',
                data: {
                    labels: yearLabels,
                    datasets: [{
                        label: 'Annual Fatalities',
                        data: yearValues,
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231, 76, 60, 0.1)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

        } catch (error) {
            console.error('Error loading summary data:', error);
            document.getElementById('total-fatalities').innerText = "Error";
        }
    }

    loadData();
</script>

</body>
</html>
