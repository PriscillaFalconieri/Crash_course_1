<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Archive Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2f3b47;
        }
        h1 { color: #f5a623; font-size: 1.5rem; }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #2f3b47;
            color: #e7e9ea;
            border: 1px solid #3d4f5f;
        }
        .btn:hover { background: #3d4f5f; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; }
        .column { flex: 1; min-width: 0; }
        .card {
            background: #16202a;
            border-radius: 12px;
            border: 1px solid #2f3b47;
            padding: 20px;
            height: 400px;
        }
        .card h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8b98a5;
            margin-bottom: 15px;
            border-bottom: 1px solid #2f3b47;
            padding-bottom: 10px;
        }
        canvas { width: 100% !important; height: 300px !important; }
        @media (max-width: 900px) { .row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Flood Archive Analysis</h1>
            <a href="index.html" class="btn">&#127968; Back to Home</a>
        </header>

        <div class="row">
            <div class="column">
                <div class="card">
                    <h3>Top 20 Countries by Events</h3>
                    <canvas id="countryChart"></canvas>
                </div>
            </div>
            <div class="column">
                <div class="card">
                    <h3>Events per Year</h3>
                    <canvas id="yearChart"></canvas>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="column">
                <div class="card">
                    <h3>Events by Category</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            <div class="column">
                <div class="card">
                    <h3>Displaced by Severity</h3>
                    <canvas id="severityChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        // Use global styles for charts to match dark theme
        Chart.defaults.color = '#8b98a5';
        Chart.defaults.borderColor = '#2f3b47';
    </script>
    <script src="js/analysis.js"></script>
</body>
</html>
